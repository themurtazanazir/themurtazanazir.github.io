<h1>{{page.title}}</h1>
<div class="section-index">
<hr class="panel-line">
{% assign posts = site.notes | where: "coll",page.coll_name %}
{% for post in posts %}
<div class="entry">
<h5><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></h5>
<p>{{ post.description }}</p>
</div>
{% endfor %}
</div>
